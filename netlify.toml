# Netlify configuration for Voidlet (Next.js App Router).
# Netlify's Next.js runtime is auto-detected; the plugin is declared
# explicitly so local `netlify build` matches CI.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # NEXT_PUBLIC_* values are embedded in the client bundle by design.
  # Exclude them from Netlify's secrets scanning (false positives).
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SITE_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"
